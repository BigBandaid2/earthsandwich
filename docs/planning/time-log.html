<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Time Log Explorer</title>
<style>

    --bg: #0f0f10;

    --border: #2a2a2e;
    --text: #e5e5e7;
    --muted: #8e8e93;
    --accent: #5b8fff;
    --ethan: #5b8fff;
    --elena: #f472b6;
    --wela: #34d399;

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  header {
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  header h1 {
    font-size: 14px;
    margin: 0;
    font-weight: 500;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  main {
    display: grid;
    grid-template-columns: 220px 1fr 340px;
    overflow: hidden;
    min-height: 0;
  }
  aside.controls, aside.details {
    background: var(--panel);
    padding: 16px;
    overflow-y: auto;
  }
  aside.controls { border-right: 1px solid var(--border); }
  aside.details { border-left: 1px solid var(--border); }
  .section {
    margin-bottom: 20px;
  }
  .section h3 {
    margin: 0 0 8px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    font-weight: 600;
  }
  fieldset {
    border: 0;
    margin: 0;
    padding: 0;
  }
  label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    cursor: pointer;
    font-size: 12.5px;
  }
  input[type=checkbox], input[type=radio] {
    accent-color: var(--accent);
  }
  .preset-btn, .toggle-btn {
    display: block;
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    margin-bottom: 4px;
    border-radius: 4px;
    cursor: pointer;
    text-align: left;
    font: inherit;
    font-size: 12.5px;
  }
  .preset-btn:hover, .toggle-btn:hover { background: #2d2d31; }
  .toggle-btn[aria-pressed="true"] { background: #2c4368; border-color: var(--accent); }
  #chart-pane {
    overflow: auto;
    padding: 16px;
    background: var(--bg);
  }
  svg { display: block; }
  .bar-segment {
    cursor: pointer;
    stroke: var(--panel);
    stroke-width: 1;
    transition: opacity 0.1s, stroke 0.1s, stroke-width 0.1s;
  }
  .bar-segment:hover { opacity: 0.75; }
  .bar-segment.selected {
    stroke: #fff;
    stroke-width: 2;
  }
  .axis text { fill: var(--muted); font-size: 11px; }
  .axis-tick line { stroke: #2a2a2e; }
  .grid-line { stroke: #1f1f22; stroke-dasharray: 2 4; }
  .details-empty { color: var(--muted); font-style: italic; }
  .detail-row { margin-bottom: 10px; }
  .detail-row .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .detail-row .val {
    margin-top: 2px;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .detail-row .val.mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: #cfcfd3;
  }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    background: var(--panel2);
    color: var(--text);
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  footer {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: stretch;

    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;

    background: var(--bg);
    color: var(--text);
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 100px;
    overflow-y: auto;

  #copy {
    background: var(--accent);

    border: 0;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    font-weight: 500;
    align-self: end;
  }

    font-size: 11px;
    margin-top: 4px;
  }
  .day-entry-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .day-entry {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;

    align-items: center;

    margin-bottom: 4px;
    font-size: 12px;

const PERSON_COLORS = {
  'Ethan Shen': '#5b8fff',
  'Elena Shen': '#f472b6',
  'Wela Quan': '#34d399',
};
const DEFAULT_COLOR = '#94a3b8';

function parseTSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split('\t');
  return lines.slice(1).filter(l => l.length).map(line => {
    const cells = line.split('\t');
    const row = Object.fromEntries(headers.map((h, i) => [h, cells[i] !== undefined ? cells[i] : '']));
    row.HoursEstimatedNum = parseFloat(row['Hours Estimated']) || 0;
    const att = (row['Hours Attested'] || '').trim();
    row.HoursAttestedNum = att.length ? parseFloat(att) : null;
    return row;
  });
}

const ALL_DATA = parseTSV(TSV_TEXT);
const ALL_PEOPLE = [...new Set(ALL_DATA.map(r => r.Person))].sort();
const ALL_SPRINTS = (() => {
  const s = [...new Set(ALL_DATA.map(r => r.Sprint))];
  s.sort((a, b) => {
    const na = parseInt((a.match(/(\d+)/) || ['', '999'])[1]);
    const nb = parseInt((b.match(/(\d+)/) || ['', '999'])[1]);
    if (na !== nb) return na - nb;
    return a.localeCompare(b);
  });
  return s;
})();

const state = {
  people: new Set(ALL_PEOPLE),
  sprints: new Set(ALL_SPRINTS),
  hoursSource: 'prefer-attested',
  excludeOverhead: false,
  selectedEntry: null,   // single row from a clicked segment
  selectedDate: null,    // ISO date string from a clicked Y-axis label
};

function getHours(row) {
  if (state.hoursSource === 'prefer-attested' && row.HoursAttestedNum !== null) {
    return row.HoursAttestedNum;
  }
  return row.HoursEstimatedNum;
}
function getColor(row) {
  return PERSON_COLORS[row.Person] || DEFAULT_COLOR;
}
// Three time categories drive a texture overlay on top of the person color:
//   story    — solid fill (no pattern)
//   overhead — 45° diagonal hatching
//   meeting  — dot grid
function categorizeRow(row) {
  const story = (row.Story || '').trim();
  if (/^OCS-\d+/i.test(story)) return 'story';
  if (/Weekly team meeting/i.test(row.Commits || '')) return 'meeting';
  return 'overhead';
}
function patternId(person, category) {
  return `pat-${category}-${person.replace(/\s+/g, '-')}`;
}
function getFill(row) {
  const cat = categorizeRow(row);
  if (cat === 'story') return getColor(row);
  return `url(#${patternId(row.Person, cat)})`;
}
function ensurePatterns(svg, ns) {
  const defs = document.createElementNS(ns, 'defs');
  ALL_PEOPLE.forEach(person => {
    const color = PERSON_COLORS[person] || DEFAULT_COLOR;
    // Overhead: 45° diagonal stripes (dark ink overlay)
    const oh = document.createElementNS(ns, 'pattern');
    oh.setAttribute('id', patternId(person, 'overhead'));
    oh.setAttribute('patternUnits', 'userSpaceOnUse');
    oh.setAttribute('width', '6'); oh.setAttribute('height', '6');
    oh.setAttribute('patternTransform', 'rotate(45)');
    const ohBase = document.createElementNS(ns, 'rect');
    ohBase.setAttribute('width', '6'); ohBase.setAttribute('height', '6'); ohBase.setAttribute('fill', color);
    const ohLine = document.createElementNS(ns, 'line');
    ohLine.setAttribute('x1', '0'); ohLine.setAttribute('y1', '0');
    ohLine.setAttribute('x2', '0'); ohLine.setAttribute('y2', '6');
    ohLine.setAttribute('stroke', 'rgba(0,0,0,0.5)');
    ohLine.setAttribute('stroke-width', '2');
    oh.appendChild(ohBase); oh.appendChild(ohLine);
    defs.appendChild(oh);
    // Meeting: white dot grid (lighter accent reads as "scheduled")
    const mt = document.createElementNS(ns, 'pattern');
    mt.setAttribute('id', patternId(person, 'meeting'));
    mt.setAttribute('patternUnits', 'userSpaceOnUse');
    mt.setAttribute('width', '5'); mt.setAttribute('height', '5');
    const mtBase = document.createElementNS(ns, 'rect');
    mtBase.setAttribute('width', '5'); mtBase.setAttribute('height', '5'); mtBase.setAttribute('fill', color);
    const mtDot = document.createElementNS(ns, 'circle');
    mtDot.setAttribute('cx', '2.5'); mtDot.setAttribute('cy', '2.5');
    mtDot.setAttribute('r', '1.1');
    mtDot.setAttribute('fill', 'rgba(255,255,255,0.75)');
    mt.appendChild(mtBase); mt.appendChild(mtDot);
    defs.appendChild(mt);
  });
  svg.appendChild(defs);
}
function filteredData() {
  return ALL_DATA.filter(r =>
    state.people.has(r.Person) &&
    state.sprints.has(r.Sprint) &&
    (!state.excludeOverhead || r.Story !== 'Overhead')
  );
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

const ns = 'http://www.w3.org/2000/svg';

const DOW_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function dowOf(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return DOW_NAMES[d.getUTCDay()];
}

function dateRange(start, end) {
  const dates = [];
  const d = new Date(start + 'T12:00:00Z');
  const last = new Date(end + 'T12:00:00Z');
  while (d <= last) {
    dates.push(d.toISOString().slice(0, 10));
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return dates;
}

function renderChart() {
  const svg = document.getElementById('chart');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  ensurePatterns(svg, ns);

  const data = filteredData();
  if (data.length === 0) {
    svg.setAttribute('width', 600);
    svg.setAttribute('height', 100);
    const t = document.createElementNS(ns, 'text');
    t.textContent = 'No data matches current filters.';
    t.setAttribute('x', 300); t.setAttribute('y', 50);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#8e8e93');
    svg.appendChild(t);
    document.getElementById('summary').textContent = '';
    return;
  }

  // Full date range (inclusive), so zero-hour days show as empty rows.
  // Reversed so the newest row sits at the top of the chart (no scroll needed
  // to see most-recent activity).
  const sortedDates = [...new Set(data.map(r => r.Date))].sort();
  const firstDate = sortedDates[0];
  const lastDate = sortedDates[sortedDates.length - 1];
  const allDates = dateRange(firstDate, lastDate).reverse();

  // Horizontal stacked bars: rows = days, bar grows left→right by hours.
  const margin = { top: 30, right: 30, bottom: 50, left: 100 };
  const barHeight = 18;
  const rowGap = 6;
  const rowHeight = barHeight + rowGap;
  const chartHeight = allDates.length * rowHeight;
  const chartWidth = 720;
  const totalWidth = chartWidth + margin.left + margin.right;
  const totalHeight = chartHeight + margin.top + margin.bottom;

  const dayTotals = allDates.map(d => data.filter(r => r.Date === d).reduce((s, r) => s + getHours(r), 0));
  const maxHours = Math.max(...dayTotals, 2);
  const xMax = Math.ceil(maxHours / 2) * 2;

  svg.setAttribute('width', totalWidth);
  svg.setAttribute('height', totalHeight);

  const xScale = h => margin.left + (h / xMax) * chartWidth;

  // Vertical grid lines + X-axis labels (top + bottom)
  for (let h = 0; h <= xMax; h += 2) {
    const x = xScale(h);
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('class', 'grid-line');
    line.setAttribute('x1', x); line.setAttribute('x2', x);
    line.setAttribute('y1', margin.top); line.setAttribute('y2', margin.top + chartHeight);
    svg.appendChild(line);
    const txtTop = document.createElementNS(ns, 'text');
    txtTop.textContent = h + 'h';
    txtTop.setAttribute('x', x);
    txtTop.setAttribute('y', margin.top - 10);
    txtTop.setAttribute('text-anchor', 'middle');
    txtTop.setAttribute('fill', '#8e8e93');
    txtTop.setAttribute('font-size', '11');
    svg.appendChild(txtTop);
    const txtBot = document.createElementNS(ns, 'text');
    txtBot.textContent = h + 'h';
    txtBot.setAttribute('x', x);
    txtBot.setAttribute('y', margin.top + chartHeight + 20);
    txtBot.setAttribute('text-anchor', 'middle');
    txtBot.setAttribute('fill', '#8e8e93');
    txtBot.setAttribute('font-size', '11');
    svg.appendChild(txtBot);
  }

  // Y-axis spine (vertical line at x=0)
  const ySpine = document.createElementNS(ns, 'line');
  ySpine.setAttribute('x1', margin.left); ySpine.setAttribute('x2', margin.left);
  ySpine.setAttribute('y1', margin.top); ySpine.setAttribute('y2', margin.top + chartHeight);
  ySpine.setAttribute('stroke', '#2a2a2e'); ySpine.setAttribute('stroke-width', '1');
  svg.appendChild(ySpine);

  // Rows (one per date)
  allDates.forEach((date, i) => {
    const rowY = margin.top + i * rowHeight + (rowGap / 2);
    const dayEntries = data.filter(r => r.Date === date);
    dayEntries.sort((a, b) => {
      if (a.Person !== b.Person) return a.Person.localeCompare(b.Person);
      if (a.Story !== b.Story) return a.Story.localeCompare(b.Story);
      return 0;
    });

    // Row backgrounds:
    //   - zero-hour rows get a subtle dark strip so the gap reads as intentional
    //   - the date-selected row (Y-axis label clicked) gets a brighter highlight
    const isZero = dayEntries.length === 0;
    const isDateSelected = state.selectedDate === date;
    if (isDateSelected) {
      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('x', margin.left);
      bg.setAttribute('y', rowY - 2);
      bg.setAttribute('width', chartWidth);
      bg.setAttribute('height', barHeight + 4);
      bg.setAttribute('fill', 'rgba(91, 143, 255, 0.12)');
      bg.setAttribute('stroke', 'rgba(91, 143, 255, 0.4)');
      svg.appendChild(bg);
    } else if (isZero) {
      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('x', margin.left);
      bg.setAttribute('y', rowY);
      bg.setAttribute('width', chartWidth);
      bg.setAttribute('height', barHeight);
      bg.setAttribute('fill', '#161618');
      svg.appendChild(bg);
    }

    let cumulative = 0;
    dayEntries.forEach(entry => {
      const h = getHours(entry);
      if (h <= 0) return;
      const segX = xScale(cumulative);
      const segW = xScale(cumulative + h) - segX;
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', segX);
      rect.setAttribute('y', rowY);
      rect.setAttribute('width', Math.max(1, segW));
      rect.setAttribute('height', barHeight);
      rect.setAttribute('fill', getFill(entry));
      rect.setAttribute('class', 'bar-segment' + (state.selectedEntry === entry ? ' selected' : ''));
      const title = document.createElementNS(ns, 'title');
      const commitsTrim = entry.Commits.length > 100 ? entry.Commits.slice(0, 97) + '...' : entry.Commits;
      title.textContent = `${entry.Date} · ${entry.Person} · ${entry.Story} · ${categorizeRow(entry)} · ${h}h\n${commitsTrim}`;
      rect.appendChild(title);
      rect.addEventListener('click', () => selectEntry(entry));
      svg.appendChild(rect);
      cumulative += h;
    });

    // Y-axis label: MM-DD + DOW. Clickable → opens a day-summary view in
    // the right panel listing all entries for that day.
    const dow = dayEntries[0]?.DOW || dowOf(date);
    const lbl = document.createElementNS(ns, 'text');
    lbl.textContent = `${date.slice(5)} ${dow}`;
    lbl.setAttribute('x', margin.left - 10);
    lbl.setAttribute('y', rowY + barHeight / 2 + 4);
    lbl.setAttribute('text-anchor', 'end');
    lbl.setAttribute('font-size', '10');
    lbl.setAttribute('font-family', 'ui-monospace, monospace');
    let labelFill = isZero ? '#5a5a5e' : '#8e8e93';
    if (isDateSelected) labelFill = '#cfcfd3';
    lbl.setAttribute('fill', labelFill);
    lbl.setAttribute('font-weight', isDateSelected ? '600' : '400');
    lbl.setAttribute('style', 'cursor: pointer');
    const labelTitle = document.createElementNS(ns, 'title');
    labelTitle.textContent = `Click to see all entries on ${date}`;
    lbl.appendChild(labelTitle);
    lbl.addEventListener('click', () => selectDate(date));
    svg.appendChild(lbl);
  });

  // Summary
  const totalH = dayTotals.reduce((a, b) => a + b, 0);
  const zeroDayCount = dayTotals.filter(d => d === 0).length;
  const peakIdx = dayTotals.indexOf(Math.max(...dayTotals));
  document.getElementById('summary').textContent =
    `${data.length} entries · ${allDates.length} days in range (${zeroDayCount} zero-hour) · ${totalH.toFixed(2)}h total · peak ${allDates[peakIdx]} (${dayTotals[peakIdx].toFixed(2)}h)`;
}

function selectEntry(entry) {
  state.selectedEntry = entry;
  state.selectedDate = null;
  renderChart();
  renderDetails();
  updatePrompt();
}

function selectDate(date) {
  // Toggle off if the same date is clicked again
  state.selectedDate = (state.selectedDate === date) ? null : date;
  state.selectedEntry = null;
  renderChart();
  renderDetails();
  updatePrompt();
}

function renderDateSummary(date) {
  const data = filteredData();
  const dayEntries = data.filter(r => r.Date === date);
  dayEntries.sort((a, b) => {
    if (a.Person !== b.Person) return a.Person.localeCompare(b.Person);
    return a.Story.localeCompare(b.Story);
  });
  const dow = dayEntries[0]?.DOW || dowOf(date);
  const total = dayEntries.reduce((s, r) => s + getHours(r), 0);
  const sprintLabel = dayEntries[0]?.Sprint ? `<span class="badge">${escapeHtml(dayEntries[0].Sprint)}</span>` : '';

  if (dayEntries.length === 0) {
    return `
      <div class="detail-row"><div class="lbl">Date</div><div class="val">${escapeHtml(date)} <span class="badge">${escapeHtml(dow)}</span></div></div>
      <div class="detail-row"><div class="lbl">Total hours</div><div class="val"><b>0h</b></div></div>
      <p class="details-empty" style="margin-top: 12px">No entries on this day (with current filters).</p>
    `;
  }

  const rows = dayEntries.map(r => {
    const h = getHours(r);
    return `
      <div class="day-entry" data-key="${escapeHtml(r.Date + '|' + r.Person + '|' + r.Story + '|' + r.Commits.slice(0, 30))}">
        <div class="day-entry-head">
          <span class="day-entry-person"><span class="legend-swatch" style="background:${getColor(r)}"></span>${escapeHtml(r.Person)}</span>
          <span class="day-entry-meta"><span class="badge">${escapeHtml(r.Story)}</span> <b>${h}h</b></span>
        </div>
        <div class="day-entry-commits mono">${escapeHtml(r.Commits)}</div>
      </div>`;
  }).join('');

  return `
    <div class="detail-row"><div class="lbl">Date</div><div class="val">${escapeHtml(date)} <span class="badge">${escapeHtml(dow)}</span> ${sprintLabel}</div></div>
    <div class="detail-row"><div class="lbl">Total hours</div><div class="val"><b>${total.toFixed(2)}h</b> across ${dayEntries.length} entr${dayEntries.length === 1 ? 'y' : 'ies'}</div></div>
    <div class="day-entry-list">${rows}</div>
  `;
}

function renderDetails() {
  const el = document.getElementById('details');
  if (state.selectedDate) {
    el.innerHTML = renderDateSummary(state.selectedDate);
    return;
  }
  if (!state.selectedEntry) {
    el.innerHTML = '<p class="details-empty">Click a segment in the chart for entry details, or click a date label on the Y-axis for a day summary.</p>';
    return;
  }
  const r = state.selectedEntry;
  const usedHours = getHours(r);
  const source = (state.hoursSource === 'prefer-attested' && r.HoursAttestedNum !== null) ? 'attested' : 'estimated';
  el.innerHTML = `
    <div class="detail-row"><div class="lbl">Date</div><div class="val">${escapeHtml(r.Date)} <span class="badge">${escapeHtml(r.DOW)}</span></div></div>
    <div class="detail-row"><div class="lbl">Sprint</div><div class="val">${escapeHtml(r.Sprint)}</div></div>
    <div class="detail-row"><div class="lbl">Story</div><div class="val">${escapeHtml(r.Story)}</div></div>
    <div class="detail-row"><div class="lbl">Person</div><div class="val"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${getColor(r)};margin-right:6px;vertical-align:middle"></span>${escapeHtml(r.Person)}</div></div>
    <div class="detail-row"><div class="lbl">Hours in chart</div><div class="val"><b>${usedHours}h</b> <span class="badge">${source}</span></div></div>
    <div class="detail-row"><div class="lbl">Hours estimated</div><div class="val">${escapeHtml(r['Hours Estimated'] || '(empty)')}</div></div>
    <div class="detail-row"><div class="lbl">Hours attested</div><div class="val">${escapeHtml(r['Hours Attested'] || '(empty — not yet attested)')}</div></div>
    <div class="detail-row"><div class="lbl">Time span</div><div class="val mono">${escapeHtml(r['Time Span'] || '—')}</div></div>
    <div class="detail-row"><div class="lbl">Commits</div><div class="val mono">${escapeHtml(r.Commits)}</div></div>
  `;
}

function renderLegend() {
  const el = document.getElementById('legend');
  const people = ALL_PEOPLE.filter(p => state.people.has(p)).map(p =>
    `<div class="legend-item"><div class="legend-swatch" style="background:${PERSON_COLORS[p] || DEFAULT_COLOR}"></div>${escapeHtml(p)}</div>`
  ).join('');
  // Category swatches use a neutral gray so the texture (not the color) reads
  // as the encoding axis. People → color; category → texture.
  const swatch = (innerSvg, label) => `<div class="legend-item"><div class="legend-swatch" style="background:transparent;padding:0;overflow:hidden">${innerSvg}</div>${label}</div>`;
  const gray = '#6b7280';
  const storyS  = `<svg width="12" height="12" xmlns="http://www.w3.org/2000/svg"><rect width="12" height="12" fill="${gray}"/></svg>`;
  const ohS     = `<svg width="12" height="12" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="lg-oh" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><rect width="6" height="6" fill="${gray}"/><line x1="0" y1="0" x2="0" y2="6" stroke="rgba(0,0,0,0.55)" stroke-width="2"/></pattern></defs><rect width="12" height="12" fill="url(#lg-oh)"/></svg>`;
  const mtgS    = `<svg width="12" height="12" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="lg-mt" patternUnits="userSpaceOnUse" width="5" height="5"><rect width="5" height="5" fill="${gray}"/><circle cx="2.5" cy="2.5" r="1.1" fill="rgba(255,255,255,0.85)"/></pattern></defs><rect width="12" height="12" fill="url(#lg-mt)"/></svg>`;
  const cats = swatch(storyS, 'Story work') + swatch(ohS, 'Overhead') + swatch(mtgS, 'Meeting');
  el.innerHTML = people + '<div style="width:1px;background:#2a2a2e;margin:0 8px;align-self:stretch"></div>' + cats;
}

function updatePrompt() {
  const data = filteredData();
  const days = new Set(data.map(r => r.Date)).size;
  const totalH = data.reduce((s, r) => s + getHours(r), 0);
  const parts = [];
  parts.push('Render docs/planning/time-log.tsv as a horizontal stacked bar chart (one row per day, oldest at top → newest at bottom, bars grow left-to-right, segments = entries, colors = person, textures = category (solid = story work, diagonal hatching = overhead, dot grid = weekly-team-meeting time), zero-hour days shown as empty rows).');
  if (state.people.size < ALL_PEOPLE.length) {
    parts.push(`Filter to ${[...state.people].join(', ')}.`);
  }
  if (state.sprints.size < ALL_SPRINTS.length) {
    parts.push(`Restrict to sprints: ${[...state.sprints].join(', ')}.`);
  }
  if (state.excludeOverhead) {
    parts.push('Exclude Overhead entries — story-attributable work only.');
  }
  if (state.hoursSource === 'estimated-only') {
    parts.push('Use the Hours Estimated column for every entry, regardless of attestation.');
  } else {
    parts.push('Use Hours Attested when populated, otherwise fall back to Hours Estimated.');
  }
  parts.push(`Result: ${data.length} entries / ${days} days / ${totalH.toFixed(2)}h shown.`);
  if (state.selectedDate) {
    const dayEntries = data.filter(r => r.Date === state.selectedDate);
    const dayTotal = dayEntries.reduce((s, r) => s + getHours(r), 0);
    parts.push(`Focus on ${state.selectedDate} (${dayEntries.length} entr${dayEntries.length === 1 ? 'y' : 'ies'}, ${dayTotal.toFixed(2)}h).`);
  } else if (state.selectedEntry) {
    const r = state.selectedEntry;
    parts.push(`Highlight ${r.Date} · ${r.Person} · ${r.Story} (${getHours(r)}h).`);
  }
  document.getElementById('prompt').textContent = parts.join(' ');
}

function rerender() {
  renderChart();
  renderDetails();
  renderLegend();
  updatePrompt();
}

// Keyboard navigation: arrow keys step the current selection forward (right)
// or backward (left). Direction is chronological — right = newer, left = older.
// Entry navigation iterates across all visible entries, day by day; date
// navigation iterates across the full date range (including zero-hour days,
// matching what the chart renders).
function navigateDate(direction) {
  if (!state.selectedDate) return false;
  const data = filteredData();
  if (data.length === 0) return false;
  const sortedDates = [...new Set(data.map(r => r.Date))].sort();
  const allDates = dateRange(sortedDates[0], sortedDates[sortedDates.length - 1]);
  const idx = allDates.indexOf(state.selectedDate);
  if (idx === -1) return false;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= allDates.length) return false;
  state.selectedDate = allDates[newIdx];
  state.selectedEntry = null;
  rerender();
  scrollSelectionIntoView();
  return true;
}

function navigateEntry(direction) {
  if (!state.selectedEntry) return false;
  const data = filteredData();
  if (data.length === 0) return false;
  const sortedDates = [...new Set(data.map(r => r.Date))].sort();
  const ordered = [];
  sortedDates.forEach(date => {
    const dayEntries = data.filter(r => r.Date === date);
    dayEntries.sort((a, b) => {
      if (a.Person !== b.Person) return a.Person.localeCompare(b.Person);
      return a.Story.localeCompare(b.Story);
    });
    ordered.push(...dayEntries);
  });
  const idx = ordered.indexOf(state.selectedEntry);
  if (idx === -1) return false;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= ordered.length) return false;
  state.selectedEntry = ordered[newIdx];
  state.selectedDate = null;
  rerender();
  scrollSelectionIntoView();
  return true;
}

function scrollSelectionIntoView() {
  // After re-render, find the highlighted DOM node and ask the browser to
  // bring it into view inside the scrollable chart-pane. block:'nearest'
  // means we only scroll when the selection is actually off-screen.
  const el = document.querySelector('.bar-segment.selected') ||
             (state.selectedDate ? findDateLabel(state.selectedDate) : null);
  if (el && typeof el.scrollIntoView === 'function') {
    el.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
  }
}

function findDateLabel(date) {
  // The label is a <text> whose textContent starts with the MM-DD slice.
  const prefix = date.slice(5);
  const labels = document.querySelectorAll('#chart text');
  for (const t of labels) {
    if (t.textContent && t.textContent.startsWith(prefix + ' ')) return t;
  }
  return null;
}

function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    // Don't intercept when typing into a form control.
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'ArrowRight') {
      const handled = state.selectedDate ? navigateDate(+1) :
                      state.selectedEntry ? navigateEntry(+1) : false;
      if (handled) e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      const handled = state.selectedDate ? navigateDate(-1) :
                      state.selectedEntry ? navigateEntry(-1) : false;
      if (handled) e.preventDefault();
    } else if (e.key === 'Escape') {
      if (state.selectedDate || state.selectedEntry) {
        state.selectedDate = null;
        state.selectedEntry = null;
        rerender();
        e.preventDefault();
      }
    }
  });
}

// Wire controls
function initPersonFilter() {
  const c = document.getElementById('person-filter');
  c.innerHTML = ALL_PEOPLE.map(p =>
    `<label><input type="checkbox" data-person="${escapeHtml(p)}" checked /> <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${PERSON_COLORS[p] || DEFAULT_COLOR};flex-shrink:0"></span>${escapeHtml(p)}</label>`
  ).join('');
  c.addEventListener('change', e => {
    const p = e.target.dataset.person;
    if (!p) return;
    if (e.target.checked) state.people.add(p); else state.people.delete(p);
    state.selectedEntry = null;
    state.selectedDate = null;
    rerender();
  });
}
function initSprintFilter() {
  const c = document.getElementById('sprint-filter');
  c.innerHTML = ALL_SPRINTS.map(s =>
    `<label><input type="checkbox" data-sprint="${escapeHtml(s)}" checked /> ${escapeHtml(s)}</label>`
  ).join('');
  c.addEventListener('change', e => {
    const s = e.target.dataset.sprint;
    if (!s) return;
    if (e.target.checked) state.sprints.add(s); else state.sprints.delete(s);
    state.selectedEntry = null;
    state.selectedDate = null;
    rerender();
  });
}
function initHoursSource() {
  document.getElementById('hsrc-filter').addEventListener('change', e => {
    state.hoursSource = e.target.value;
    rerender();
  });
}
function initToggleOverhead() {
  const btn = document.getElementById('toggle-overhead');
  btn.addEventListener('click', () => {
    state.excludeOverhead = !state.excludeOverhead;
    btn.setAttribute('aria-pressed', state.excludeOverhead);
    btn.textContent = state.excludeOverhead ? 'Show Overhead' : 'Exclude Overhead';
    rerender();
  });
}
function initPresets() {
  const checkAll = (sel, on) => document.querySelectorAll(sel).forEach(cb => cb.checked = on);
  const checkOnly = (sel, attr, value) => document.querySelectorAll(sel).forEach(cb => cb.checked = cb.dataset[attr] === value);
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const preset = btn.dataset.preset;
      state.selectedEntry = null;
    state.selectedDate = null;
      switch (preset) {
        case 'all':
          state.people = new Set(ALL_PEOPLE);
          state.sprints = new Set(ALL_SPRINTS);
          state.excludeOverhead = false;
          checkAll('#person-filter input[type=checkbox]', true);
          checkAll('#sprint-filter input[type=checkbox]', true);
          break;
        case 'ethan':
          state.people = new Set(['Ethan Shen']);
          state.sprints = new Set(ALL_SPRINTS);
          state.excludeOverhead = false;
          checkOnly('#person-filter input', 'person', 'Ethan Shen');
          checkAll('#sprint-filter input[type=checkbox]', true);
          break;
        case 'elena':
          state.people = new Set(['Elena Shen']);
          state.sprints = new Set(ALL_SPRINTS);
          state.excludeOverhead = false;
          checkOnly('#person-filter input', 'person', 'Elena Shen');
          checkAll('#sprint-filter input[type=checkbox]', true);
          break;
        case 'sprint3':
          state.people = new Set(ALL_PEOPLE);
          state.sprints = new Set(['Sprint 3']);
          state.excludeOverhead = false;
          checkAll('#person-filter input[type=checkbox]', true);
          checkOnly('#sprint-filter input', 'sprint', 'Sprint 3');
          break;
        case 'story-only':
          state.excludeOverhead = true;
          break;
      }
      const tb = document.getElementById('toggle-overhead');
      tb.setAttribute('aria-pressed', state.excludeOverhead);
      tb.textContent = state.excludeOverhead ? 'Show Overhead' : 'Exclude Overhead';
      rerender();
    });
  });
}
function initCopy() {
  document.getElementById('copy').addEventListener('click', async () => {
    const text = document.getElementById('prompt').textContent;
    const btn = document.getElementById('copy');
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    } catch (e) {
      // Fallback: select the prompt text for manual copy
      const range = document.createRange();
      range.selectNodeContents(document.getElementById('prompt'));
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      btn.textContent = 'Selected — Ctrl+C';
      setTimeout(() => btn.textContent = 'Copy prompt', 2000);
    }
  });
}

initPersonFilter();
initSprintFilter();
initHoursSource();
initToggleOverhead();
initPresets();
initCopy();
initKeyboard();
rerender();
</script>
