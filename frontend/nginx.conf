server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the media volume mount at the same path the app references
    location /public/media/ {
        alias /public/media/;
    }

    # SPA fallback — unknown paths route to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
