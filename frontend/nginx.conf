server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API returns media_url as /media/<file>; files are mounted at /public/media/
    location /media/ {
        alias /public/media/;
    }

    # SPA fallback — unknown paths route to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
