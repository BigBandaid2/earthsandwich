services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: earthsandwich
      POSTGRES_PASSWORD: earthsandwich
      POSTGRES_DB: earthsandwich
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earthsandwich -d earthsandwich"]
      interval: 5s
      timeout: 5s
      retries: 5
