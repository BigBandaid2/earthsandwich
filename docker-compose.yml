services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: earthsandwich
      POSTGRES_PASSWORD: earthsandwich
      POSTGRES_DB: earthsandwich
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earthsandwich -d earthsandwich"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://earthsandwich:earthsandwich@db:5432/earthsandwich
    volumes:
      - ./backend/session.json:/app/instagrapi_session.json
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
